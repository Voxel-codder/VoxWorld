[target.x86_64-unknown-linux-gnu]
rustflags = [
    "-C", "link-arg=-fuse-ld=mold",
]

[target.aarch64-unknown-linux-gnu]
linker = "aarch64-linux-gnu-gcc"
rustflags = [
    "-C", "link-arg=-fuse-ld=mold",
]

[target.x86_64-pc-windows-gnu]
rustflags = [
    # Required for mimalloc
    "-C", "link-arg=-lpsapi",
]

[target.wasm32-unknown-unknown]
rustflags = [
    # Required once original common/world/client crates are pulled into the
    # browser build path. It lets getrandom use the Web Crypto API.
    "--cfg", 'getrandom_backend="wasm_js"',
]

# Clever way to get workspace dir, from https://github.com/rust-lang/cargo/issues/3946#issuecomment-973132993
[env]
CARGO_WORKSPACE_DIR = { value = "", relative = true }

[alias]
# tools
cmd-doc-gen = "run --features=bin_cmd_doc_gen --bin cmd_doc_gen"
csv-export = "run --manifest-path common/Cargo.toml --features=bin_csv --bin csv_export"
csv-import = "run --manifest-path common/Cargo.toml --features=bin_csv --bin csv_import"
find_unused = "run --manifest-path common/Cargo.toml --bin find_unused"
dot-recipes = "run --manifest-path common/Cargo.toml --features=bin_graphviz --bin recipe_graphviz"
dot-skills = "run --manifest-path common/Cargo.toml --features=bin_graphviz --bin skill_graphviz"
img-export = "run --manifest-path voxygen/Cargo.toml --features=bin_img-export --bin img-export"
# server-cli
server = "run --bin voxworld-server-cli"
test-server = "run --bin voxworld-server-cli --no-default-features --features simd"
tracy-server = "run --bin voxworld-server-cli --features tracy,simd --profile no_overflow"
tracy-server-debuginfo = "run --bin voxworld-server-cli --features tracy,simd --profile no_overflow_debuginfo"
tracy-server-releasedebuginfo = "run --bin voxworld-server-cli --features tracy,simd --profile releasedebuginfo"
tracy-test-server = "run --bin voxworld-server-cli --no-default-features --features tracy,simd --profile no_overflow"
# client
test-client = "run --bin voxworld-client --no-default-features --features simd,egui-ui,shaderc-from-source,hot-reloading"
tracy-client = "run --bin voxworld-client --no-default-features --features tracy,simd,egui-ui,shaderc-from-source --profile no_overflow"
dbg-client = "run --bin voxworld-client --profile debuginfo"
# misc
swarm = "run --bin swarm --features client/bin_bot,client/tick_network --"
ci-clippy = "clippy --all-targets --locked --features=bin_cmd_doc_gen,bin_compression,bin_csv,bin_graphviz,bin_bot,bin_asset_migrate,asset_tweak,bin,stat"
ci-clippy2 = "clippy -p voxworld-client --locked --no-default-features --features=default-publish"
