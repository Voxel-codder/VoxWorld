<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Vox World Web Client</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <canvas id="world-canvas" aria-label="Vox World web client canvas"></canvas>

    <section class="touch-controls" aria-label="Touch controls">
      <div class="move-pad" aria-label="Movement">
        <button id="touch-forward" class="touch-button touch-button-up" type="button" aria-label="Move forward">W</button>
        <button id="touch-left" class="touch-button touch-button-left" type="button" aria-label="Move left">A</button>
        <button id="touch-back" class="touch-button touch-button-down" type="button" aria-label="Move back">S</button>
        <button id="touch-right" class="touch-button touch-button-right" type="button" aria-label="Move right">D</button>
      </div>
      <div class="action-pad" aria-label="Actions">
        <button id="touch-primary" class="touch-button touch-action-primary" type="button" aria-label="Primary action">Hit</button>
        <button id="touch-secondary" class="touch-button" type="button" aria-label="Secondary action">Alt</button>
        <button id="touch-jump" class="touch-button" type="button" aria-label="Jump">Jump</button>
        <button id="touch-roll" class="touch-button" type="button" aria-label="Roll">Roll</button>
        <button id="touch-block" class="touch-button" type="button" aria-label="Block">Block</button>
        <button id="touch-interact" class="touch-button" type="button" aria-label="Interact">Use</button>
        <button id="touch-pickup" class="touch-button" type="button" aria-label="Pick up item">Pick</button>
        <button id="touch-wield" class="touch-button" type="button" aria-label="Toggle wield">Wield</button>
        <button id="touch-swap-loadout" class="touch-button" type="button" aria-label="Swap loadout">Swap</button>
        <button id="touch-sneak" class="touch-button" type="button" aria-label="Toggle sneak">Sneak</button>
        <button id="touch-sit" class="touch-button" type="button" aria-label="Sit">Sit</button>
        <button id="touch-respawn" class="touch-button" type="button" aria-label="Respawn">Resp</button>
      </div>
    </section>

    <section class="connection-panel">
      <label for="player-name">Name</label>
      <div class="connection-row">
        <input id="player-name" autocomplete="nickname" maxlength="24" spellcheck="false" />
      </div>
      <label for="server-url">Server</label>
      <div class="connection-row">
        <input id="server-url" autocomplete="off" spellcheck="false" />
        <button id="connect-button" type="button">Connect</button>
      </div>
      <p id="server-summary">Checking server...</p>
      <p id="connection-status">Not connected</p>
      <p id="online-players">Online: none</p>
      <div id="chat-log" class="chat-log" aria-live="polite"></div>
      <form id="chat-form" class="chat-row" autocomplete="off">
        <input
          id="chat-input"
          aria-label="Chat message"
          maxlength="240"
          placeholder="Message"
          spellcheck="true"
        />
        <button type="submit">Send</button>
      </form>
    </section>

    <script type="module">
      import init from "./pkg/voxworld_web_client.js";

      let wasmReady = false;
      let autoConnectAttempted = false;
      const serverUrl = document.getElementById("server-url");
      const connectButton = document.getElementById("connect-button");
      const playerName = document.getElementById("player-name");
      const guestKey = "voxworld_guest_name";

      function cleanName(value) {
        return String(value || "")
          .toLowerCase()
          .replace(/[^a-z0-9_-]/g, "")
          .slice(0, 24);
      }

      function defaultGuestName() {
        const existing = cleanName(window.localStorage?.getItem(guestKey));
        if (existing.length >= 3) {
          return existing;
        }

        const random = new Uint32Array(1);
        window.crypto?.getRandomValues(random);
        return `web${(random[0] || Math.floor(Math.random() * 0xffffff)).toString(36).slice(0, 8)}`;
      }

      function currentGuestName() {
        const current = cleanName(playerName?.value);
        return current.length >= 3 ? current : defaultGuestName();
      }

      function syncServerUrl() {
        if (!serverUrl) {
          return;
        }

        const scheme = window.location.protocol === "https:" ? "wss" : "ws";
        const name = currentGuestName();
        window.localStorage?.setItem(guestKey, name);
        serverUrl.value = `${scheme}://${window.location.host}/play?name=${encodeURIComponent(name)}`;
      }

      if (playerName) {
        playerName.value = defaultGuestName();
        playerName.addEventListener("input", () => {
          autoConnectAttempted = false;
          syncServerUrl();
        });
      }
      if (serverUrl) {
        syncServerUrl();
      }
      if (connectButton) {
        connectButton.disabled = true;
      }

      async function refreshStatus() {
        const summary = document.getElementById("server-summary");
        if (!summary) {
          return;
        }

        try {
          const response = await fetch("/api/status", { cache: "no-store" });
          const data = await response.json();
          const query = data.query_server?.result;
          const tcpReachable = Boolean(data.upstream?.tcp_reachable);
          const webSessions = data.web_sessions || {};
          const activeSessions = Number(webSessions.active || 0);
          const maxSessions = Number(webSessions.max || 0);
          const webFull = maxSessions > 0 && activeSessions >= maxSessions;
          const serviceReady = Boolean(data.ready ?? query?.ok);
          const sessionText = maxSessions > 0 ? ` | web ${activeSessions}/${maxSessions}` : "";
          const reachable = Boolean(serviceReady && !webFull);

          if (connectButton) {
            connectButton.disabled = !reachable;
          }

          if (webFull) {
            summary.textContent = `Server full (${activeSessions}/${maxSessions} web sessions)`;
          } else if (query?.ok) {
            summary.textContent = `${query.players}/${query.player_cap} online${sessionText}`;
          } else if (tcpReachable) {
            summary.textContent = `Server starting...${sessionText}`;
          } else {
            summary.textContent = `Server offline${sessionText}`;
          }

          if (reachable && wasmReady && !autoConnectAttempted) {
            autoConnectAttempted = true;
            connectButton?.click();
          }
        } catch (error) {
          console.error(error);
          summary.textContent = "Status unavailable";
          if (connectButton) {
            connectButton.disabled = true;
          }
        }
      }

      refreshStatus();
      window.setInterval(refreshStatus, 5000);

      init().then(() => {
        wasmReady = true;
        refreshStatus();
      }).catch((error) => {
        console.error(error);
        const status = document.getElementById("connection-status");
        if (status) {
          status.textContent = "WASM failed to start";
        }
      });
    </script>
  </body>
</html>
