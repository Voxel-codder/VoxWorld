<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Vox World Voxygen Web</title>
    <link rel="stylesheet" href="./styles.css?v=20260607-004" />
  </head>
  <body>
    <canvas id="voxworld-canvas" aria-label="Vox World Voxygen Web canvas"></canvas>
    <aside class="boot-panel" aria-live="polite">
      <div class="boot-title">Vox World</div>
      <div class="boot-subtitle">Original WorldSim terrain</div>
      <div id="voxworld-status" class="status status-loading">Loading Voxygen Web...</div>
      <div id="voxworld-detail" class="detail">Preparing browser runtime...</div>
    </aside>
    <aside id="voxworld-trade-panel" class="trade-panel trade-panel-hidden" aria-live="polite">
      <div class="trade-panel-head">
        <div>
          <div class="trade-kicker">Market</div>
          <div id="voxworld-trade-title" class="trade-title">Trade</div>
        </div>
        <div id="voxworld-trade-phase" class="trade-phase">Mutate</div>
      </div>
      <div class="trade-section-label">Site Stock</div>
      <div id="voxworld-trade-stock" class="stock-row"></div>
      <div class="trade-section-label">Wares</div>
      <div id="voxworld-trade-wares" class="wares-list"></div>
      <div class="trade-offers">
        <div>
          <div class="trade-section-label">Merchant Offer</div>
          <div id="voxworld-trade-merchant-offer" class="offer-list"></div>
        </div>
        <div>
          <div class="trade-section-label">Player Offer</div>
          <div id="voxworld-trade-player-offer" class="offer-list"></div>
        </div>
      </div>
      <div id="voxworld-trade-balance" class="trade-balance"></div>
    </aside>
    <script type="module">
      const showBootError = (error) => {
        const status = document.getElementById("voxworld-status");
        const detail = document.getElementById("voxworld-detail");
        if (status) {
          status.className = "status status-error";
          status.textContent = "Voxygen web scene failed.";
        }
        if (detail) {
          detail.textContent = error instanceof Error ? error.message : String(error);
        }
      };

      try {
        const assetVersion = "20260607-016";
        const { default: init } = await import(
          `./pkg/voxworld_voxygen_web.js?v=${assetVersion}`
        );

        init({
          module_or_path: new URL(
            `./pkg/voxworld_voxygen_web_bg.wasm?v=${assetVersion}`,
            import.meta.url,
          ),
        }).catch(showBootError);
      } catch (error) {
        showBootError(error);
      }
    </script>
  </body>
</html>
